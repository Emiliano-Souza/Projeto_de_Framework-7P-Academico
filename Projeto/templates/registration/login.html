<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Entrar</title>
</head>
<body>
  <h1>Entrar</h1>

  {% if form.errors %}
    <p>Usuario ou senha invalidos.</p>
  {% endif %}

  {% if next %}
    <p>Faça login para continuar.</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Entrar</button>
  </form>
</body>
</html>
